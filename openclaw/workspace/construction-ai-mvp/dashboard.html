<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Construction AI MVP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;
    
    const mockData = {
      summary: {
        totalProjects: 3, activeProjects: 2, totalBudget: 2500000000, avgProfit: "8.07",
        trafficLight: { green: 1, yellow: 1, red: 1 }
      },
      projects: [
        { id: 'PROJ-001', name: 'คอนโด High-Rise สุขุมวิท', budget: 500, profit: 12.5, status: 'green', alerts: [] },
        { id: 'PROJ-002', name: 'โรงงาน EEC ระยอง', budget: 800, profit: 8.2, status: 'yellow', alerts: ['ต้นทุนวัสดุเพิ่ม 5%'] },
        { id: 'PROJ-003', name: 'โรงพยาบาลเชียงใหม่', budget: 1200, profit: 3.5, status: 'red', alerts: ['กำลังคนไม่พอ', 'Client จ่ายช้า'] }
      ],
      forecast: [
        { m: 'M1', v: 5.2 }, { m: 'M2', v: 6.5 }, { m: 'M3', v: 7.8 },
        { m: 'M4', v: 9.1 }, { m: 'M5', v: 10.5 }, { m: 'M6', v: 11.8 }
      ]
    };
    
    function App() {
      const [tab, setTab] = useState('dashboard');
      const [data, setData] = useState(mockData);
      
      useEffect(() => {
        fetch('http://localhost:3001/api/dashboard/summary')
          .then(r => r.json()).then(d => setData(p => ({...p, summary: d})))
          .catch(() => {});
      }, []);
      
      const s = data.summary;
      
      return (
        <div className="min-h-screen bg-gray-100">
          <header className="bg-white shadow-sm border-b">
            <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center space-x-3">
                <div className="h-10 w-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">AI</div>
                <div>
                  <h1 className="text-xl font-bold">Construction Intelligence</h1>
                  <p className="text-sm text-gray-500">ระบบ AI บริหารโครงการก่อสร้าง</p>
                </div>
              </div>
              <div className="flex space-x-1 bg-gray-100 rounded-lg p-1">
                {['dashboard', 'projects', 'ai', 'esg'].map(t => (
                  <button key={t} onClick={() => setTab(t)} 
                    className={`px-4 py-2 rounded-md text-sm font-medium ${tab === t ? 'bg-white shadow text-blue-600' : 'text-gray-600'}`}>
                    {t === 'dashboard' ? 'ภาพรวม' : t === 'projects' ? 'โครงการ' : t === 'ai' ? 'AI พยากรณ์' : 'ESG'}
                  </button>
                ))}
              </div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto px-4 py-6">
            {tab === 'dashboard' && (
              <div className="space-y-6">
                <div className="grid grid-cols-3 gap-4">
                  <div className="bg-white rounded-xl shadow-sm p-6 border-l-4 border-green-500">
                    <p className="text-sm text-gray-600">โครงการปกติ</p>
                    <p className="text-3xl font-bold text-green-600">{s.trafficLight.green}</p>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm p-6 border-l-4 border-yellow-500">
                    <p className="text-sm text-gray-600">ต้องติดตาม</p>
                    <p className="text-3xl font-bold text-yellow-600">{s.trafficLight.yellow}</p>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm p-6 border-l-4 border-red-500">
                    <p className="text-sm text-gray-600">ต้องเร่งด่วน</p>
                    <p className="text-3xl font-bold text-red-600">{s.trafficLight.red}</p>
                  </div>
                </div>
                
                <div className="grid grid-cols-4 gap-4">
                  <div className="bg-white rounded-xl shadow-sm p-5">
                    <p className="text-sm text-gray-500">โครงการ</p>
                    <p className="text-2xl font-bold">{s.totalProjects}</p>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm p-5">
                    <p className="text-sm text-gray-500">กำลังดำเนินการ</p>
                    <p className="text-2xl font-bold">{s.activeProjects}</p>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm p-5">
                    <p className="text-sm text-gray-500">งบประมาณ</p>
                    <p className="text-2xl font-bold">{(s.totalBudget/1e9).toFixed(1)}B</p>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm p-5">
                    <p className="text-sm text-gray-500">กำไรเฉลี่ย</p>
                    <p className="text-2xl font-bold text-green-600">{s.avgProfit}%</p>
                  </div>
                </div>
                
                <div className="bg-white rounded-xl shadow-sm p-6">
                  <h3 className="text-lg font-semibold mb-4">📈 AI Profit Forecast</h3>
                  <div className="h-64">
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={data.forecast}>
                        <XAxis dataKey="m" /><YAxis /><Tooltip />
                        <Line type="monotone" dataKey="v" stroke="#3b82f6" strokeWidth={3} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            )}
            
            {tab === 'projects' && (
              <div className="space-y-4">
                {data.projects.map(p => (
                  <div key={p.id} className="bg-white rounded-xl shadow-sm p-6">
                    <div className="flex items-start justify-between">
                      <div className="flex items-center space-x-4">
                        <div className={`h-4 w-4 rounded-full ${p.status === 'green' ? 'bg-green-500' : p.status === 'yellow' ? 'bg-yellow-500' : 'bg-red-500'}`} />
                        <div>
                          <h3 className="font-semibold text-lg">{p.name}</h3>
                          <p className="text-sm text-gray-500">{p.id} • งบ {p.budget}M</p>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className="text-sm text-gray-500">กำไรที่คาดการณ์</p>
                        <p className="text-xl font-bold text-green-600">{p.profit}%</p>
                      </div>
                    </div>
                    {p.alerts.length > 0 && (
                      <div className="mt-4 space-y-2">
                        {p.alerts.map((a, i) => (
                          <div key={i} className={`p-3 rounded-lg text-sm ${p.status === 'red' ? 'bg-red-50 text-red-700' : 'bg-yellow-50 text-yellow-700'}`}>
                            ⚠️ {a}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
            
            {tab === 'ai' && (
              <div className="space-y-6">
                <div className="bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl shadow-lg p-8 text-white">
                  <h2 className="text-2xl font-bold mb-2">🤖 Pre-Project AI Scanner</h2>
                  <p className="text-blue-100">วิเคราะห์ความเสี่ยงก่อนรับงานด้วย AI</p>
                </div>
                <div className="grid grid-cols-2 gap-6">
                  <div className="bg-white rounded-xl shadow-sm p-6 text-center">
                    <div className="h-24 w-24 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
                      <span className="text-3xl font-bold text-green-600">88%</span>
                    </div>
                    <p className="text-sm text-gray-600">ความแม่นยำในการทำนาย</p>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm p-6">
                    <h3 className="font-semibold mb-4">ปัจจัยที่วิเคราะห์</h3>
                    <ul className="space-y-2 text-sm">
                      {['ประวัติลูกค้า', 'แนวโน้มต้นทุนวัสดุ', 'ความพร้อมแรงงาน', 'สภาพอากาศ'].map((item, i) => (
                        <li key={i} className="flex items-center space-x-2"><div className="h-2 w-2 bg-blue-500 rounded-full"/><span>{item}</span></li>
                      ))}
                    </ul>
                  </div>
                </div>
              </div>
            )}
            
            {tab === 'esg' && (
              <div className="space-y-6">
                <div className="bg-gradient-to-r from-green-600 to-teal-600 rounded-xl shadow-lg p-8 text-white">
                  <h2 className="text-2xl font-bold mb-2">🌱 ESG Dashboard</h2>
                  <p className="text-green-100">ติดตามความยั่งยืนสำหรับรายงาน SET</p>
                </div>
                <div className="grid grid-cols-3 gap-4">
                  <div className="bg-white rounded-xl shadow-sm p-6 text-center">
                    <div className="text-3xl mb-2">🌿</div>
                    <p className="text-3xl font-bold text-green-600">23</p>
                    <p className="text-sm text-gray-600">ตันคาร์บอนลดได้</p>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm p-6 text-center">
                    <div className="text-3xl mb-2">🛡️</div>
                    <p className="text-3xl font-bold text-blue-600">365</p>
                    <p className="text-sm text-gray-600">วันไร้อุบัติเหตุ</p>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm p-6 text-center">
                    <div className="text-3xl mb-2">😊</div>
                    <p className="text-3xl font-bold text-purple-600">4.5/5</p>
                    <p className="text-sm text-gray-600">ความพึงพอใจพนักงาน</p>
                  </div>
                </div>
              </div>
            )}
          </main>
          
          <footer className="bg-white border-t mt-12">
            <div className="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-500">
              <p>Construction AI Platform • MVP Demo • ไข่เป็ด 🐣</p>
            </div>
          </footer>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
