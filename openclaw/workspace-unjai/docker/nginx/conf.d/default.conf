# LINE Gateway - Webhook endpoint
server {
    listen 80;
    server_name _;

    # Health check
    location /health {
        proxy_pass http://line-gateway:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # LINE Webhook (high rate limit)
    location /webhook {
        limit_req zone=webhook burst=20 nodelay;
        proxy_pass http://line-gateway:8000/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API routes
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://line-gateway:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Analytics Dashboard
    location /dashboard/ {
        proxy_pass http://analytics:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Basic auth for dashboard (optional)
        # auth_basic "Admin Dashboard";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # Default
    location / {
        proxy_pass http://line-gateway:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
