apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  unjai-overview.json: |
    {
      "dashboard": {
        "title": "Nong UnjAI Overview",
        "tags": ["unjai"],
        "timezone": "Asia/Bangkok",
        "panels": [
          {
            "id": 1,
            "title": "Requests per Second",
            "type": "stat",
            "targets": [{
              "expr": "rate(unjai_requests_total[5m])",
              "legendFormat": "{{path}}"
            }],
            "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Error Rate",
            "type": "stat",
            "targets": [{
              "expr": "rate(unjai_requests_total{status=~\"5..\"}[5m]) / rate(unjai_requests_total[5m])",
              "legendFormat": "Error %"
            }],
            "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}
          },
          {
            "id": 3,
            "title": "P99 Latency",
            "type": "stat",
            "targets": [{
              "expr": "histogram_quantile(0.99, rate(unjai_request_duration_seconds_bucket[5m]))",
              "legendFormat": "P99"
            }],
            "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}
          },
          {
            "id": 4,
            "title": "Active Users",
            "type": "stat",
            "targets": [{
              "expr": "unjai_active_users",
              "legendFormat": "Users"
            }],
            "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}
          },
          {
            "id": 5,
            "title": "Request Latency",
            "type": "graph",
            "targets": [
              {"expr": "histogram_quantile(0.99, rate(unjai_request_duration_seconds_bucket[5m]))", "legendFormat": "P99"},
              {"expr": "histogram_quantile(0.95, rate(unjai_request_duration_seconds_bucket[5m]))", "legendFormat": "P95"},
              {"expr": "histogram_quantile(0.50, rate(unjai_request_duration_seconds_bucket[5m]))", "legendFormat": "P50"}
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}
          },
          {
            "id": 6,
            "title": "Crisis Incidents",
            "type": "graph",
            "targets": [{
              "expr": "rate(unjai_crisis_incidents_total[5m])",
              "legendFormat": "Incidents/sec"
            }],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}
          }
        ]
      }
    }
