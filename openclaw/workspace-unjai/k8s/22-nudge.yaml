apiVersion: batch/v1
kind: CronJob
metadata:
  name: nudge-scheduler
  namespace: unjai
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: nudge
            image: nong-unjai/nudge:latest
            imagePullPolicy: Always
            envFrom:
            - configMapRef:
                name: unjai-config
            env:
            - name: LINE_CHANNEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: unjai-secrets
                  key: line-channel-token
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unjai-secrets
                  key: postgres-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unjai-secrets
                  key: redis-password
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
          restartPolicy: OnFailure
