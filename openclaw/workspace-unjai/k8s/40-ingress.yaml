apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unjai-ingress
  namespace: unjai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - nong-unjai.example.com
    secretName: nong-unjai-tls
  rules:
  - host: nong-unjai.example.com
    http:
      paths:
      # LINE Webhook
      - path: /webhook
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8000
      # Health check
      - path: /health
        pathType: Exact
        backend:
          service:
            name: gateway
            port:
              number: 8000
      # Analytics Dashboard
      - path: /dashboard
        pathType: Prefix
        backend:
          service:
            name: analytics
            port:
              number: 8002
      # Default to gateway
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8000
