
services:
  # ==========================================
  # Database Services
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: unjai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unjai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unjai123}
      POSTGRES_DB: ${POSTGRES_DB:-unjai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unjai} -d ${POSTGRES_DB:-unjai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unjai-network

  redis:
    image: redis:7-alpine
    container_name: unjai-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-unjai123} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unjai-network

  # ==========================================
  # Core Application Services
  # ==========================================
  line-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: unjai-gateway
    restart: unless-stopped
    environment:
      # LINE Bot
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      
      # Pinecone Configuration
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-aunjai-knowledge}
      PINECONE_INDEX_HOST: ${PINECONE_INDEX_HOST}
      PINECONE_NAMESPACE: ${PINECONE_NAMESPACE:-highlights}
      
      # Base URL for clips
      BASE_URL: ${BASE_URL:-https://nongaunjai.febradio.org}
      
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-unjai}
      POSTGRES_USER: ${POSTGRES_USER:-unjai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unjai123}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-unjai123}
      
      # Orchestrator
      ORCHESTRATOR_URL: http://orchestrator:8001
      
      # Middleware
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://middleware:8080}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started
    networks:
      - unjai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    container_name: unjai-orchestrator
    restart: unless-stopped
    environment:
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # Pinecone
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-unjai-knowledge}
      
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-unjai}
      POSTGRES_USER: ${POSTGRES_USER:-unjai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unjai123}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-unjai123}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${ORCHESTRATOR_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - unjai-network

  analytics:
    build:
      context: ..
      dockerfile: docker/Dockerfile.analytics
    container_name: unjai-analytics
    restart: unless-stopped
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-unjai}
      POSTGRES_USER: ${POSTGRES_USER:-unjai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unjai123}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-unjai123}
      REDIS_DB: 4
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${ANALYTICS_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - unjai-network

  nudge-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nudge
    container_name: unjai-nudge
    restart: unless-stopped
    environment:
      # LINE Bot
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-unjai}
      POSTGRES_USER: ${POSTGRES_USER:-unjai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unjai123}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-unjai123}
      REDIS_DB: 3
      
      # Gateway
      GATEWAY_URL: http://line-gateway:8000
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      line-gateway:
        condition: service_started
    networks:
      - unjai-network

  trend-predictor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.trends
    container_name: unjai-trends
    restart: unless-stopped
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-unjai}
      POSTGRES_USER: ${POSTGRES_USER:-unjai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unjai123}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unjai-network

  # ==========================================
  # Reverse Proxy
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: unjai-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - line-gateway
      - analytics
    networks:
      - unjai-network

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  unjai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
