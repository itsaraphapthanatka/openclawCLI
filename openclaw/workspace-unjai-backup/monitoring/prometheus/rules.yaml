apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  unjai-alerts.yml: |
    groups:
    - name: unjai
      rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(unjai_requests_total{status=~"5.."}[5m]) / rate(unjai_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for 2 minutes"
      
      # High latency
      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(unjai_request_duration_seconds_bucket[5m])) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "99th percentile latency is above 500ms"
      
      # Crisis spike
      - alert: CrisisSpike
        expr: rate(unjai_crisis_incidents_total[1h]) > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Crisis incident spike"
          description: "More than 10 crisis incidents in the last hour"
      
      # Service down
      - alert: ServiceDown
        expr: up{job=~"unjai-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "{{ $labels.job }} is not responding"
      
      # Low sentiment
      - alert: LowSentiment
        expr: avg_over_time(unjai_sentiment_score_sum[1h]) < -0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Community sentiment declining"
          description: "Average sentiment score is below -0.5"
