apiVersion: batch/v1
kind: CronJob
metadata:
  name: trend-predictor
  namespace: unjai
spec:
  schedule: "0 * * * *"  # Every hour
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: trends
            image: nong-unjai/trends:latest
            imagePullPolicy: Always
            envFrom:
            - configMapRef:
                name: unjai-config
            env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unjai-secrets
                  key: postgres-password
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
          restartPolicy: OnFailure
